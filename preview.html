<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Vista previa PDF - Zip e-partes convert</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            height: 56px;
            flex-shrink: 0;
        }

        #titulo {
            font-size: 18px;
            font-weight: 600;
        }

        #header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #btn-download {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #117dbd;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 4px;
        }

        #btn-download:hover {
            background: #0e6aa3;
        }

        #brand {
            color: #117dbd;
            font-weight: 600;
            font-size: 16px;
        }

        #preview {
            flex: 1;
            width: 100%;
            display: block;
            border: none;
        }

        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            gap: 16px;
        }

        #loading-overlay.visible {
            display: flex;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border: 6px solid #dee2e6;
            border-top-color: #117dbd;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #loading-msg {
            font-size: 16px;
            font-weight: 600;
            color: #117dbd;
        }
    </style>
</head>

<body>
    <div id="header">
        <h1 id="titulo">Cargando...</h1>
        <div id="header-right">
            <button id="btn-download">&#8595; Descargar</button>
            <span id="brand">Zip e-partes convert</span>
        </div>
    </div>
    <iframe id="preview" frameborder="0"></iframe>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <span id="loading-msg">Descargando archivo...</span>
    </div>
    <script src="assets/js/preview.js"></script>
</body>

</html>
